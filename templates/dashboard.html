<!doctype html><html><head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head><body><div class="container mt-5"><div class="card shadow p-4"><h2 class="mb-4">Generate Exam PDF</h2><form method="post" action="/generate"><label>Section</label><select id="section" name="section" class="form-select form-select-lg mb-4"></select><label>Date</label><select id="date" name="date" class="form-select form-select-lg mb-4"></select><button class="btn btn-success btn-lg">Download PDF</button></form></div></div><script>const sections={{ sections|tojson }};const s=document.getElementById('section');const d=document.getElementById('date');sections.forEach(v=>{let o=document.createElement('option');o.value=v;o.text=v;s.add(o);});async function loadDates(){let r=await fetch('/dates/'+s.value);let j=await r.json();d.innerHTML='';j.dates.forEach(v=>{let o=document.createElement('option');o.value=v;o.text=v;d.add(o);});}s.addEventListener('change',loadDates);loadDates();</script></body></html>
